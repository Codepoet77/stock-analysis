services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockanalysis}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ${DOCKERHUB_USERNAME}/stock-analysis-api:latest
    build:
      context: ./src/StockAnalysis.Api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-stockanalysis};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      Polygon__ApiKey: ${POLYGON_API_KEY:?Set POLYGON_API_KEY in .env}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Cors__AllowedOrigins__0: ${APP_URL:-http://localhost}
    ports:
      - "5123:5123"

  web:
    image: ${DOCKERHUB_USERNAME}/stock-analysis-ui:latest
    build:
      context: ./src/stock-analysis-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
